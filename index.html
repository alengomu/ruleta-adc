<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruleta ADC</title>
  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at 50% 40%, #141b24 0%, #07090c 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      user-select: none;
    }

    /* ============================================================
       CONTAINER (FLEX: máquina a la izquierda, lista a la derecha)
       ============================================================ */
    .container {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      max-width: 1120px;
      padding: 32px 20px;
    }

    .main-area {
      flex: 0 0 520px;
      max-width: 520px;
      text-align: center;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      margin-bottom: 32px;
      position: relative;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 8px;
      color: #c8aa6e;
      text-shadow: 0 0 40px rgba(200, 170, 110, 0.15);
    }

    .header h1 span { color: #fff; }

    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 10px;
      object-fit: cover;
    }

    .header .subtitle {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #4a5260;
      margin-top: 4px;
    }

    /* ============================================================
       SLOT MACHINE
       ============================================================ */
    .slot-machine {
      position: relative;
      background: linear-gradient(170deg, #1a212e 0%, #0f141c 100%);
      border: 2px solid #c8aa6e;
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow:
        0 0 50px rgba(200, 170, 110, 0.08),
        inset 0 0 80px rgba(0, 0, 0, 0.6);
    }

    /* Borde decorativo externo */
    .slot-machine::before {
      content: '';
      position: absolute;
      inset: -6px;
      border: 1px solid rgba(200, 170, 110, 0.2);
      border-radius: 22px;
      pointer-events: none;
    }

    /* Tornillos decorativos */
    .screw {
      position: absolute;
      width: 12px; height: 12px;
      background: radial-gradient(circle at 35% 35%, #d4b87a, #8a7330);
      border-radius: 50%;
      box-shadow:
        inset 0 1px 2px rgba(255, 255, 255, 0.3),
        0 1px 3px rgba(0, 0, 0, 0.5);
    }
    .screw.tl { top: 10px; left: 10px; }
    .screw.tr { top: 10px; right: 10px; }
    .screw.bl { bottom: 10px; left: 10px; }
    .screw.br { bottom: 10px; right: 10px; }

    /* ============================================================
       REEL (CARRETE)
       ============================================================ */
    .reel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slot {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 10px 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.15s ease;
      position: relative;
    }

    .slot .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: #1e2636;
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    .slot .name {
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8892a8;
      transition: all 0.15s ease;
    }

    /* Posiciones alejadas del centro */
    .slot.pos--2, .slot.pos-2 {
      opacity: 0.25;
      transform: scale(0.78);
      margin: -6px 0;
    }
    .slot.pos--2 .avatar, .slot.pos-2 .avatar { width: 34px; height: 34px; }
    .slot.pos--2 .name, .slot.pos-2 .name { font-size: 0.65rem; }

    .slot.pos--1, .slot.pos-1 {
      opacity: 0.5;
      transform: scale(0.9);
      margin: -3px 0;
    }
    .slot.pos--1 .avatar, .slot.pos-1 .avatar { width: 46px; height: 46px; }
    .slot.pos--1 .name, .slot.pos-1 .name { font-size: 0.8rem; }

    /* Posición central (destacada) */
    .slot.pos-0 {
      background: linear-gradient(135deg, rgba(200, 170, 110, 0.12), rgba(200, 170, 110, 0.03));
      border: 1px solid rgba(200, 170, 110, 0.3);
      box-shadow:
        0 0 30px rgba(200, 170, 110, 0.12),
        inset 0 0 40px rgba(200, 170, 110, 0.05);
      transform: scale(1.05);
      margin: 4px 0;
      padding: 14px 24px;
    }

    .slot.pos-0 .avatar {
      width: 84px; height: 84px;
      border: 3px solid #c8aa6e;
      box-shadow: 0 0 30px rgba(200, 170, 110, 0.3);
    }

    .slot.pos-0 .name {
      font-size: 1.4rem;
      color: #c8aa6e;
      text-shadow: 0 0 25px rgba(200, 170, 110, 0.25);
    }

    /* Flechas indicadoras laterales */
    .slot.pos-0 .indicator {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #c8aa6e;
      font-size: 0.75rem;
      opacity: 0.7;
      animation: indicatorPulse 1.6s ease-in-out infinite;
    }
    .slot.pos-0 .indicator.left  { left: 4px;  }
    .slot.pos-0 .indicator.right { right: 4px; }

    @keyframes indicatorPulse {
      0%, 100% { opacity: 0.3; }
      50%      { opacity: 1; }
    }

    /* ============================================================
       DIVISORAS ENTRE SLOTS
       ============================================================ */
    .slot-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200, 170, 110, 0.15), transparent);
      margin: 0 10px;
    }

    /* ============================================================
       SIDEBAR — GRILLA DE CAMPEONES
       ============================================================ */
    .champion-list {
      flex: 0 0 480px;
      background: linear-gradient(170deg, #1a212e 0%, #0f141c 100%);
      border: 1px solid rgba(200, 170, 110, 0.2);
      border-radius: 14px;
      padding: 18px;
      position: sticky;
      top: 32px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }

    .champion-list::-webkit-scrollbar { width: 4px; }
    .champion-list::-webkit-scrollbar-track { background: transparent; }
    .champion-list::-webkit-scrollbar-thumb { background: rgba(200, 170, 110, 0.3); border-radius: 2px; }

    .list-header {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #c8aa6e;
      text-align: center;
      padding-bottom: 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(200, 170, 110, 0.12);
    }

    .list-items {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }

    .list-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      cursor: default;
      transition: all 0.2s;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
      background: rgba(255, 255, 255, 0.03);
    }

    .list-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .list-item img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #1e2636;
      transition: all 0.2s;
    }

    .list-item.active {
      border-color: #c8aa6e;
      background: rgba(200, 170, 110, 0.12);
      box-shadow: 0 0 12px rgba(200, 170, 110, 0.2);
    }

    .list-item.active img {
      box-shadow: 0 0 10px rgba(200, 170, 110, 0.3);
    }

    /* Botón de quitar (X) al hacer hover */
    .list-item .btn-remove {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: #ff4444;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      transform: scale(0.8);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .list-item:hover .btn-remove {
      opacity: 1;
      transform: scale(1);
    }

    .list-item .btn-remove:hover {
      background: #ff2222;
      transform: scale(1.15);
    }

    /* ============================================================
       SIDEBAR — URL COPIABLE
       ============================================================ */
    .url-copy {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(200, 170, 110, 0.12);
      border-radius: 8px;
    }

    .url-copy .url-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5a6270;
      margin-bottom: 4px;
    }

    .url-copy .url-row {
      display: flex;
      gap: 4px;
    }

    .url-copy .url-row input {
      flex: 1;
      padding: 5px 8px;
      font-size: 0.6rem;
      color: #8892a8;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      outline: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .url-copy .url-row .btn-copy {
      flex-shrink: 0;
      padding: 5px 10px;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #fff;
      background: rgba(200, 170, 110, 0.2);
      border: 1px solid rgba(200, 170, 110, 0.3);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .url-copy .url-row .btn-copy:hover {
      background: rgba(200, 170, 110, 0.35);
    }

    .url-copy .url-row .btn-copy.copied {
      background: rgba(81, 207, 102, 0.25);
      border-color: rgba(81, 207, 102, 0.4);
      color: #51cf66;
    }

    .url-copy .url-hint {
      font-size: 0.55rem;
      color: #4a5260;
      margin-top: 4px;
      font-style: italic;
    }

    /* ============================================================
       SIDEBAR — FORMULARIO AGREGAR CAMPEÓN
       ============================================================ */
    .add-champion-form {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(200, 170, 110, 0.12);
    }

    .add-champion-form .add-toggle {
      width: 100%;
      padding: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #c8aa6e;
      background: rgba(200, 170, 110, 0.08);
      border: 1px dashed rgba(200, 170, 110, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-champion-form .add-toggle:hover {
      background: rgba(200, 170, 110, 0.15);
    }

    .add-champion-form .add-fields {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .add-champion-form .add-fields.open {
      display: flex;
    }

    .add-champion-form input {
      width: 100%;
      padding: 6px 10px;
      font-size: 0.75rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-champion-form input:focus {
      border-color: rgba(200, 170, 110, 0.5);
    }

    .add-champion-form input::placeholder {
      color: #4a5260;
    }

    .add-champion-form .add-btn {
      padding: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      background: linear-gradient(135deg, #c8aa6e, #a8873e);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .add-champion-form .add-btn:hover {
      opacity: 0.85;
    }

    .add-champion-form .add-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .add-champion-form .add-msg {
      font-size: 0.6rem;
      color: #5a6270;
      text-align: center;
      margin-top: 4px;
    }

    .add-champion-form .add-msg.success {
      color: #51cf66;
    }

    .add-champion-form .add-msg.error {
      color: #ff6b6b;
    }

    /* ============================================================
       RESULTADO
       ============================================================ */
    .result {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 24px;
      padding: 16px 24px;
      background: linear-gradient(135deg, rgba(200, 170, 110, 0.08), transparent);
      border: 1px solid rgba(200, 170, 110, 0.15);
      border-radius: 12px;
    }

    .result.visible { display: flex; animation: resultIn 0.6s ease-out; }

    @keyframes resultIn {
      from { opacity: 0; transform: translateY(12px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .result img {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 2px solid #c8aa6e;
      box-shadow: 0 0 30px rgba(200, 170, 110, 0.3);
      animation: resultGlow 2.5s ease-in-out infinite;
    }

    @keyframes resultGlow {
      0%, 100% { box-shadow: 0 0 30px rgba(200, 170, 110, 0.3); }
      50%      { box-shadow: 0 0 60px rgba(200, 170, 110, 0.6); }
    }

    .result .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #5a6270;
    }

    .result .champ-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: #c8aa6e;
      text-shadow: 0 0 20px rgba(200, 170, 110, 0.2);
    }

    /* ============================================================
       BOTÓN GIRAR
       ============================================================ */
    .btn-spin {
      margin-top: 26px;
      padding: 16px 52px;
      font-size: 1.15rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #fff;
      background: linear-gradient(135deg, #c8aa6e 0%, #a8873e 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 24px rgba(200, 170, 110, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-spin::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.15), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-spin:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(200, 170, 110, 0.45);
    }
    .btn-spin:hover::after { opacity: 1; }
    .btn-spin:active { transform: translateY(1px); }

    .btn-spin:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: 0 2px 12px rgba(200, 170, 110, 0.15);
    }

    /* ============================================================
       CONFETI
       ============================================================ */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -12px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 1080px) {
      .container {
        flex-direction: column;
        align-items: center;
        padding: 20px 16px;
        gap: 20px;
      }
      .main-area { flex: none; width: 100%; max-width: 520px; }
      .champion-list {
        flex: none;
        width: 100%;
        max-width: 520px;
        max-height: 220px;
        position: static;
      }
      .list-items { grid-template-columns: repeat(8, 1fr); gap: 4px; }
      .list-item { padding: 2px; }
    }

    @media (max-width: 600px) {
      .container { padding: 16px 12px; gap: 16px; }
      .header h1 { font-size: 1.4rem; letter-spacing: 4px; }
      .slot-machine { padding: 20px 12px; }
      .slot { padding: 6px 14px; gap: 10px; }
      .slot.pos-0 { padding: 10px 14px; }
      .slot.pos--2 .avatar, .slot.pos-2 .avatar { width: 28px; height: 28px; }
      .slot.pos--1 .avatar, .slot.pos-1 .avatar { width: 36px; height: 36px; }
      .slot.pos-0 .avatar { width: 60px; height: 60px; }
      .slot.pos-0 .name { font-size: 1.1rem; }
      .result { flex-direction: column; text-align: center; gap: 12px; }
      .result .champ-name { font-size: 1.2rem; }
      .btn-spin { padding: 14px 36px; font-size: 1rem; }
      .champion-list { max-height: 200px; }
      .list-items { grid-template-columns: repeat(6, 1fr); gap: 3px; }
    }
  </style>
</head>

      <div class="slot-machine">
        <div class="screw tl"></div>
        <div class="screw tr"></div>
        <div class="screw bl"></div>
        <div class="screw br"></div>

          <!-- Los 5 slots se generan dinámicamente con JS -->

      <div class="result" id="result">
        <img id="resultImg" src="" alt="" />

          <div class="label">Hoy juegas con</div>

    <!-- ===== SIDEBAR: GRILLA DE CAMPEONES ===== -->
    <aside class="champion-list" id="championList">
      <div class="list-header">Campeones</div>
      <div class="list-items" id="championListItems"></div>

      <!-- URL copiable -->
      <div class="url-copy">
        <div class="url-label">URL Data Dragon</div>
        <div class="url-row">
          <input type="text" id="urlTemplateInput" readonly value="https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Nombre.png" />
          <button class="btn-copy" id="btnCopyUrl">Copiar</button>

        <button class="add-toggle" id="addToggle">+ Agregar campeón</button>
        <div class="add-fields" id="addFields">
          <input type="text" id="addNameInput" placeholder="Nombre (ej: Sett)" maxlength="30" />
          <input type="text" id="addImgInput" placeholder="URL imagen (opcional)" />
          <button class="add-btn" id="addBtn">Agregar</button>
          <div class="add-msg" id="addMsg"></div>
        </div>
      </div>
    </aside>

  </div>

  <!-- ===== CONFETI ===== -->
  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    // ================================================================
    //  CONFIGURACIÓN — Agrega o quita campeones aquí
    // ================================================================
    const CHAMPIONS = [
      { name: 'Ashe',       img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Ashe.png' },
      { name: 'Caitlyn',    img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Caitlyn.png' },
      { name: 'Jinx',       img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Jinx.png' },
      { name: 'Ezreal',     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Ezreal.png' },
      { name: "Kai'Sa",     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Kaisa.png' },
      { name: 'Jhin',       img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Jhin.png' },
      { name: 'Miss Fortune', img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/MissFortune.png' },
      { name: 'Vayne',      img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Vayne.png' },
      { name: 'Xayah',      img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Xayah.png' },
      { name: 'Draven',     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Draven.png' },
      { name: 'Lucian',     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Lucian.png' },
      { name: 'Samira',     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Samira.png' },
      { name: 'Aphelios',   img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Aphelios.png' },
      { name: 'Sivir',      img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Sivir.png' },
      { name: 'Twitch',     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Twitch.png' },
      { name: "Kog'Maw",    img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/KogMaw.png' },
      { name: 'Varus',      img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Varus.png' },
      { name: 'Tristana',   img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Tristana.png' },
      { name: 'Nilah',      img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Nilah.png' },
      { name: 'Zeri',       img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Zeri.png' },
      { name: 'Akshan',    img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Akshan.png' },
      { name: 'Kalista',   img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Kalista.png' },
      { name: 'Kennen',    img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Kennen.png' },
      { name: 'Teemo',     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Teemo.png' },
      { name: 'Veigar',    img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Veigar.png' },
      { name: 'Yone',      img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Yone.png' },
      { name: 'Ziggs',     img: 'https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/Ziggs.png' },
    ];

    // ================================================================
    //  DOM REFS
    // ================================================================
    const reel       = document.getElementById('reel');
    const resultEl   = document.getElementById('result');
    const resultImg  = document.getElementById('resultImg');
    const resultName = document.getElementById('resultName');
    const btnSpin    = document.getElementById('btnSpin');
    const confetti   = document.getElementById('confettiContainer');

    // ================================================================
    //  ESTADO
    // ================================================================
    let N = CHAMPIONS.length;
    let position   = 0;      // posición continua (aumenta con cada giro)
    let lastIndex  = 0;      // último campeón seleccionado
    let isSpinning = false;
    let tickCount  = 0;      // para sonido

    // ================================================================
    //  CONSTRUIR SLOTS
    // ================================================================
    const slotEls = [];

    function buildSlots() {
      for (let i = 0; i < 5; i++) {
        const slot = document.createElement('div');
        slot.className = `slot pos-${i - 2}`;  // -2, -1, 0, +1, +2

        slot.innerHTML = `
          <span class="indicator left">▶</span>
          <img class="avatar" src="" alt="" />
          <span class="name"></span>
          <span class="indicator right">◀</span>
        `;

        // Solo la posición central tiene indicadores visibles
        if (i !== 2) {
          slot.querySelector('.indicator.left').style.display  = 'none';
          slot.querySelector('.indicator.right').style.display = 'none';
        }

        reel.appendChild(slot);
        slotEls.push(slot);

        // Divisor (excepto después del último)
        if (i < 4) {
          const div = document.createElement('div');
          div.className = 'slot-divider';
          reel.appendChild(div);
        }
      }
    }
    buildSlots();

    // ================================================================
    //  RENDER
    // ================================================================
    function getChampIdx(offset) {
      return ((Math.floor(offset) % N) + N) % N;
    }

    let activeListIdx = -1; // índice en la lista ordenada (sidebar)

    function render(centerIdx) {
      for (let i = 0; i < 5; i++) {
        const offset = i - 2;
        const idx = ((centerIdx + offset) % N + N) % N;
        const champ = CHAMPIONS[idx];
        const slot = slotEls[i];
        slot.querySelector('.avatar').src = champ.img;
        slot.querySelector('.avatar').alt = champ.name;
        slot.querySelector('.name').textContent = champ.name;
      }
      // Resaltar en la sidebar
      highlightInList(centerIdx);
    }

    // ================================================================
    //  SIDEBAR — GRILLA DE CAMPEONES
    // ================================================================
    const listContainer = document.getElementById('championListItems');

    // Mapa: nombre de campeón → índice en el DOM de list-items
    const champDomIndex = {};

    function rebuildChampionList() {
      const sorted = [...CHAMPIONS].sort((a, b) => a.name.localeCompare(b.name));

      listContainer.innerHTML = '';
      champDomIndex.length = 0;

      sorted.forEach((champ, i) => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.title = champ.name;

        const img = document.createElement('img');
        img.src = champ.img;
        img.alt = champ.name;
        img.loading = 'lazy';
        item.appendChild(img);

        const btn = document.createElement('button');
        btn.className = 'btn-remove';
        btn.textContent = '×';
        btn.title = `Quitar ${champ.name}`;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          removeChampion(champ.name);
        });
        item.appendChild(btn);

        listContainer.appendChild(item);
        champDomIndex[champ.name] = i;
      });
    }
    rebuildChampionList();

    // Renderizar estado inicial (después de construir la sidebar)
    render(0);

    function highlightInList(champIdx) {
      const champName = CHAMPIONS[champIdx].name;
      const sortedIdx = champDomIndex[champName];
      if (sortedIdx == null) return;

      if (activeListIdx !== -1 && activeListIdx < listContainer.children.length) {
        listContainer.children[activeListIdx].classList.remove('active');
      }

      activeListIdx = sortedIdx;
      const el = listContainer.children[activeListIdx];
      if (el) {
        el.classList.add('active');
        el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    // ================================================================
    //  SONIDO (Web Audio API — sin archivos)
    // ================================================================
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function playTick() {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = 600 + Math.random() * 500;
        gain.gain.setValueAtTime(0.06, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.04);
      } catch (_) {}
    }

    function playWinSound() {
      try {
        const ctx = getAudioCtx();
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.12;
          gain.gain.setValueAtTime(0.1, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
          osc.start(t);
          osc.stop(t + 0.25);
        });
      } catch (_) {}
    }

    // ================================================================
    //  CONFETI
    // ================================================================
    function spawnConfetti() {
      const colors = ['#c8aa6e', '#ff6b6b', '#51cf66', '#4dabf7', '#ffd43b', '#da77f2', '#20c997'];
      for (let i = 0; i < 70; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        const color = colors[Math.floor(Math.random() * colors.length)];
        const size = 5 + Math.random() * 10;
        const left  = Math.random() * 100;
        const dur   = 2 + Math.random() * 2;
        const delay = Math.random() * 1.2;
        const shape = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.cssText = `
          left:${left}%; width:${size}px; height:${size}px;
          background:${color}; border-radius:${shape};
          animation-duration:${dur}s; animation-delay:${delay}s;
        `;
        confetti.appendChild(piece);
        setTimeout(() => piece.remove(), (dur + delay) * 1000 + 100);
      }
    }

    // ================================================================
    //  GIRO
    // ================================================================
    function spin() {
      if (isSpinning) return;
      isSpinning = true;
      btnSpin.disabled = true;
      resultEl.classList.remove('visible');

      // --- Elegir campeón (evitar repetición) ---
      let targetIndex = Math.floor(Math.random() * N);
      if (targetIndex === lastIndex) targetIndex = (targetIndex + 1) % N;
      lastIndex = targetIndex;

      // --- Calcular distancia ---
      const startPos = position;
      const currentMod = ((Math.floor(startPos) % N) + N) % N;
      const diff = ((targetIndex - currentMod) % N + N) % N;
      const rotations = 2 + Math.floor(Math.random() * 2); // 2 o 3 vueltas
      const steps = N * rotations + diff;
      const endPos = startPos + steps;

      // --- Animación ---
      const startTime = performance.now();
      const duration  = 10000 + Math.random() * 2000; // 10–12 s

      function animate(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        // ease-out cuadrático: frena suavemente
        const eased = 1 - (1 - t) * (1 - t);

        const currentPos = startPos + steps * eased;
        const centerIdx = getChampIdx(currentPos);

        // Sonido: tick cada vez que cambia el campeón central
        const newTick = Math.floor(currentPos);
        if (newTick !== tickCount) {
          playTick();
          tickCount = newTick;
        }

        render(centerIdx);

        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          // Asegurar posición final exacta
          position = endPos;
          render(targetIndex);

          // Sonido de victoria + confeti
          playWinSound();
          spawnConfetti();

          // Mostrar resultado
          const champ = CHAMPIONS[targetIndex];
          resultImg.src    = champ.img;
          resultImg.alt    = champ.name;
          resultName.textContent = champ.name;
          resultEl.classList.add('visible');

          isSpinning = false;
          btnSpin.disabled = false;
        }
      }

      requestAnimationFrame(animate);
    }

    // ================================================================
    //  AGREGAR NUEVO CAMPEÓN
    // ================================================================
    const addToggle   = document.getElementById('addToggle');
    const addFields   = document.getElementById('addFields');
    const addNameInput = document.getElementById('addNameInput');
    const addImgInput = document.getElementById('addImgInput');
    const addBtn      = document.getElementById('addBtn');
    const addMsg      = document.getElementById('addMsg');

    addToggle.addEventListener('click', () => {
      addFields.classList.toggle('open');
      if (addFields.classList.contains('open')) {
        addNameInput.focus();
      }
    });

    function getDataDragonUrl(name) {
      const clean = name.trim().replace(/[^a-zA-Z0-9]/g, '');
      return `https://ddragon.leagueoflegends.com/cdn/15.5.1/img/champion/${clean}.png`;
    }

    addBtn.addEventListener('click', () => {
      const name = addNameInput.value.trim();
      if (!name) {
        addMsg.textContent = 'Ingresa un nombre';
        addMsg.className = 'add-msg error';
        return;
      }

      if (CHAMPIONS.some(c => c.name.toLowerCase() === name.toLowerCase())) {
        addMsg.textContent = `${name} ya existe`;
        addMsg.className = 'add-msg error';
        return;
      }

      const imgUrl = addImgInput.value.trim() || getDataDragonUrl(name);

      CHAMPIONS.push({ name, img: imgUrl });
      N = CHAMPIONS.length;
      position = Math.floor(position) % N;

      rebuildChampionList();
      render(Math.floor(position) % N);

      addNameInput.value = '';
      addImgInput.value = '';
      addMsg.textContent = `${name} agregado ✓`;
      addMsg.className = 'add-msg success';
      addFields.classList.remove('open');
    });

    // Permitir Enter en los inputs
    addNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });
    addImgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });

    // ================================================================
    //  QUITAR CAMPEÓN
    // ================================================================
    function removeChampion(name) {
      const idx = CHAMPIONS.findIndex(c => c.name === name);
      if (idx === -1) return;

      CHAMPIONS.splice(idx, 1);
      N = CHAMPIONS.length;
      position = Math.floor(position) % N;

      // Si el último seleccionado ya no existe, reiniciar
      if (lastIndex >= N) lastIndex = 0;

      rebuildChampionList();
      render(Math.floor(position) % N);

      // Actualizar resultado si el campeón quitado era el mostrado
      const currentChamp = CHAMPIONS[Math.floor(position) % N];
      if (currentChamp) {
        resultImg.src = currentChamp.img;
        resultName.textContent = currentChamp.name;
      }
    }

    // ================================================================
    //  COPIAR URL DATA DRAGON
    // ================================================================
    const btnCopyUrl = document.getElementById('btnCopyUrl');
    const urlInput = document.getElementById('urlTemplateInput');

    btnCopyUrl.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(urlInput.value);
        btnCopyUrl.textContent = 'Copiado';
        btnCopyUrl.classList.add('copied');
        setTimeout(() => {
          btnCopyUrl.textContent = 'Copiar';
          btnCopyUrl.classList.remove('copied');
        }, 2000);
      } catch (_) {
        // Fallback: seleccionar el texto
        urlInput.select();
        document.execCommand('copy');
        btnCopyUrl.textContent = 'Copiado';
        btnCopyUrl.classList.add('copied');
        setTimeout(() => {
          btnCopyUrl.textContent = 'Copiar';
          btnCopyUrl.classList.remove('copied');
        }, 2000);
      }
    });

    // ================================================================
    //  EVENTOS
    // ================================================================
    btnSpin.addEventListener('click', spin);

    btnSpin.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        spin();
      }
    });

    // ================================================================
    //  INICIALIZAR VISTA
    // ================================================================
    const initChamp = CHAMPIONS[0];
    resultImg.src    = initChamp.img;
    resultImg.alt    = initChamp.name;
    resultName.textContent = initChamp.name;
    resultEl.classList.add('visible');

    console.log('🎯 Ruleta ADC cargada —', CHAMPIONS.length, 'campeones disponibles');
  </script>
</body>
</html>
